<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeployMe</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        margin: 0;
        width: 320px;
        background: #0f172a;
        color: #e2e8f0;
      }

      .panel {
        padding: 16px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 9999px;
        background: rgba(59, 130, 246, 0.14);
        color: #93c5fd;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 10px;
        margin-bottom: 12px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
        line-height: 1.3;
        color: #f8fafc;
      }

      p {
        margin: 0 0 14px;
        font-size: 13px;
        line-height: 1.5;
        color: #cbd5e1;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        background: #2563eb;
        color: white;
        font-size: 13px;
        font-weight: 600;
        padding: 11px 14px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .status {
        margin-top: 10px;
        min-height: 18px;
        font-size: 12px;
        color: #94a3b8;
      }

      .status.ok {
        color: #86efac;
      }

      .status.error {
        color: #fca5a5;
      }

      .account {
        margin-top: 4px;
        min-height: 16px;
        font-size: 12px;
        color: #bfdbfe;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="badge">DeployMe</div>
      <h1>Login Google</h1>
      <p>Usa a mesma conta Google do DeployMe. Se usares outra conta, a sincronização não vai bater certo.</p>
      <button id="login-button" type="button">Entrar com Google</button>
      <div id="status" class="status"></div>
      <div id="account" class="account"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
